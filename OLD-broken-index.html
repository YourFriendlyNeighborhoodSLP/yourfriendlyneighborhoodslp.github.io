<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Friendly Neighborhood SLP · Tool Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet" />
<style>
  :root {
    --lav-bg:#F2ECFF;
    --purple:#7C5CFC;
    --purple-deep:#5B33D6;
    --purple-ink:#3C2A6E;
    --pink:#FF5BA0;
    --pink-deep:#F0388A;
    --pink-soft:#FFD6EC;
    --gold:#FFC23D;
    --gold-deep:#F1A21B;
    --mint:#5AD6B0;
    --sky:#54C7F2;
    --ink:#3A2D5F;
    --ink-soft:#6F5E97;
    --white:#FFFFFF;
    --ok:#36C28B;
    --bg-base:#1C1046;
    --bg-glow-1:#C42E96;
    --bg-glow-2:#7A3AE6;
    --bg-glow-3:#3A2270;
    --font-display:'Fredoka', system-ui, sans-serif;
    --font-body:'Nunito', system-ui, sans-serif;
    --r-lg:30px;
    --r-md:22px;
    --shadow-card:0 18px 40px -18px rgba(91,51,214,.45);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: var(--font-body);
    color: var(--ink);
    min-height: 100vh;
    background:
      radial-gradient(ellipse 70% 55% at 18% 20%, rgba(196,46,150,.38) 0%, transparent 65%),
      radial-gradient(ellipse 55% 50% at 82% 15%, rgba(122,58,230,.45) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 50% 90%, rgba(58,34,112,.6) 0%, transparent 70%),
      var(--bg-base);
  }

  /* ── STARS ── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(.7); }
    50%       { opacity: var(--op, .7); transform: scale(1); }
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 56px 24px 36px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 50px;
    padding: 6px 18px 6px 10px;
    margin-bottom: 24px;
    backdrop-filter: blur(8px);
  }
  .badge-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 8px var(--ok);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 6px var(--ok); }
    50%      { box-shadow: 0 0 14px var(--ok); }
  }
  .badge span {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,.85);
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 6vw, 3.6rem);
    font-weight: 700;
    color: #F4ECFF;
    line-height: 1.15;
    margin-bottom: 12px;
  }
  h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-family: var(--font-body);
    font-size: 1.05rem;
    font-weight: 600;
    color: rgba(236,224,255,.72);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* ── GRID ── */
  main {
    position: relative; z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 12px 24px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border-radius: var(--r-lg);
    padding: 32px 28px 28px;
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    gap: 14px;
    text-decoration: none;
    color: inherit;
    transition: transform .18s ease, box-shadow .18s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: var(--accent, var(--purple));
    border-radius: var(--r-lg) var(--r-lg) 0 0;
  }
  .card:hover {
    transform: translateY(-5px) scale(1.01);
    box-shadow: 0 28px 50px -18px rgba(91,51,214,.5);
  }

  .card-icon {
    font-size: 2.4rem;
    line-height: 1;
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--purple-ink);
    line-height: 1.2;
  }

  .card-desc {
    font-size: .92rem;
    font-weight: 600;
    color: var(--ink-soft);
    line-height: 1.5;
    flex: 1;
  }

  .card-cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    color: var(--white);
    background: var(--accent, var(--purple));
    border-radius: 50px;
    padding: 9px 20px;
    margin-top: 4px;
    align-self: flex-start;
    transition: filter .15s;
  }
  .card:hover .card-cta { filter: brightness(1.1); }
  .card-cta svg { width: 14px; height: 14px; fill: currentColor; }

  /* ── COMING SOON ── */
  .card.soon {
    opacity: .72;
    pointer-events: none;
  }
  .soon-pill {
    position: absolute;
    top: 18px; right: 18px;
    background: var(--gold);
    color: var(--purple-ink);
    font-family: var(--font-body);
    font-size: .72rem;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 50px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  /* ── MEET THE TEAM ── */
  .team-section {
    position: relative; z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 0 24px 20px;
    text-align: center;
  }
  .team-heading {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    color: #F4ECFF;
    margin-bottom: 6px;
  }
  .team-sub {
    font-family: var(--font-body);
    font-size: .92rem;
    font-weight: 600;
    color: rgba(236,224,255,.55);
    margin-bottom: 36px;
    letter-spacing: .04em;
  }
  .team-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 36px 24px;
    max-width: 720px;
    margin: 0 auto;
  }
  @media (max-width: 640px) {
    .team-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 400px) {
    .team-grid { grid-template-columns: 1fr; }
  }
  .team-member {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px;
    border-radius: 18px;
    transition: background .18s ease;
    font-family: inherit;
  }
  .team-member:hover {
    background: rgba(255,255,255,.06);
  }
  .team-member:focus-visible {
    outline: 2px solid var(--pink);
    outline-offset: 2px;
  }
  .team-avatar {
    width: 110px; height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,.18);
    box-shadow: 0 0 0 4px rgba(124,58,237,.35), 0 14px 30px -8px rgba(91,51,214,.6);
    transition: transform .22s ease, box-shadow .22s ease;
  }
  .team-member:hover .team-avatar {
    transform: translateY(-6px) scale(1.06);
    box-shadow: 0 0 0 4px var(--pink), 0 20px 40px -10px rgba(91,51,214,.7);
  }
  .team-name {
